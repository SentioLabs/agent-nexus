name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Shared Layout
        run: node shared/scripts/validate-shared.mjs

      - name: Validate Claude Marketplace
        run: node claude-marketplace/scripts/validate-claude-marketplace.mjs

      - name: Validate Codex Marketplace
        run: node codex-marketplace/scripts/validate-codex-marketplace.mjs

      - name: Validate OpenCode Marketplace
        run: node opencode-marketplace/scripts/validate-opencode-marketplace.mjs

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-opencode-arc:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' && contains(needs.release-please.outputs.paths_released, 'opencode-marketplace/plugins/arc') }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/opencode-npm-publish.yml
    with:
      package-path: opencode-marketplace/plugins/arc
    secrets:
      npm_token: ${{ secrets.NPM_TOKEN }}
