name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: opencode-marketplace/plugins/arc/package-lock.json

      - name: Validate Shared Layout
        run: node shared/scripts/validate-shared.mjs

      - name: Validate Claude Marketplace
        run: node claude-marketplace/scripts/validate-claude-marketplace.mjs

      - name: Validate Codex Marketplace
        run: node codex-marketplace/scripts/validate-codex-marketplace.mjs

      - name: Validate OpenCode Marketplace
        run: node opencode-marketplace/scripts/validate-opencode-marketplace.mjs

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Install OpenCode Arc dependencies
        if: ${{ steps.release.outputs.releases_created == 'true' && contains(steps.release.outputs.paths_released, 'opencode-marketplace/plugins/arc') }}
        working-directory: opencode-marketplace/plugins/arc
        run: npm ci

      - name: Test OpenCode Arc package
        if: ${{ steps.release.outputs.releases_created == 'true' && contains(steps.release.outputs.paths_released, 'opencode-marketplace/plugins/arc') }}
        working-directory: opencode-marketplace/plugins/arc
        run: npm test

      - name: Verify OpenCode Arc package contents
        if: ${{ steps.release.outputs.releases_created == 'true' && contains(steps.release.outputs.paths_released, 'opencode-marketplace/plugins/arc') }}
        working-directory: opencode-marketplace/plugins/arc
        run: npm run pack:dry-run

      - name: Publish OpenCode Arc to npm
        if: ${{ steps.release.outputs.releases_created == 'true' && contains(steps.release.outputs.paths_released, 'opencode-marketplace/plugins/arc') }}
        working-directory: opencode-marketplace/plugins/arc
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
